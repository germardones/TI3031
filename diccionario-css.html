<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diccionario CSS Premium</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-color: #0284c7;
            --accent-hover: #0369a1;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
        }

        /* Ambient Background Elements */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(56, 189, 248, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Nav */
        .nav-back {
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 8px;
            transition: var(--transition);
        }

        .btn-back:hover {
            background: rgba(56, 189, 248, 0.2);
            transform: translateX(-5px);
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Controls: Search & Filter */
        .controls {
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .search-wrapper {
            position: sticky;
            top: 2rem;
            z-index: 100;
            width: 100%;
            max-width: 600px;
        }

        .search-wrapper input {
            width: 100%;
            padding: 1.25rem 1.5rem;
            padding-left: 3.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            color: white;
            font-size: 1.125rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: var(--transition);
            outline: none;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
        }

        .search-wrapper input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 1.4rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
        }

        .filter-btn {
            padding: 0.5rem 1.25rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            border-radius: 99px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .filter-btn:hover {
            border-color: var(--accent-color);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
            font-weight: 600;
        }

        /* Grid */
        .dictionary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        /* Card */
        .prop-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            position: relative;
            overflow: hidden;
            height: 100%;
        }

        .prop-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: var(--card-shadow);
        }

        .prop-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-color);
            opacity: 0.3;
        }

        .prop-category {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-color);
            margin-bottom: 0.25rem;
            opacity: 0.8;
        }

        .prop-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            word-break: break-all;
            font-family: 'JetBrains Mono', monospace;
        }

        .prop-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Values Table */
        .prop-values {
            margin-top: 1rem;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.1);
        }

        .values-header {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            padding: 0.5rem 1rem;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--glass-border);
        }

        .value-row {
            display: grid;
            grid-template-columns: 80px 1fr;
            border-bottom: 1px solid var(--glass-border);
            transition: background 0.2s;
        }

        .value-row:last-child { border-bottom: none; }

        .value-name {
            padding: 0.5rem 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #38bdf8;
            font-weight: 700;
            background: rgba(56, 189, 248, 0.05);
        }

        .value-desc {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        [data-theme="light"] .prop-values { background: #f1f5f9; }
        [data-theme="light"] .value-name { color: #0284c7; }

        .prop-example {
            margin-top: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #7dd3fc;
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        [data-theme="light"] .prop-example {
            background: #f1f5f9;
            color: #0369a1;
        }

        /* Stats */
        .stats {
            text-align: center;
            margin-top: 5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 4rem;
            color: var(--text-secondary);
        }

        footer {
            margin-top: 5rem;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid var(--glass-border);
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 0.75rem 1.25rem;
            border-radius: 99px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: var(--transition);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--card-shadow);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            background: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">
        <span id="themeEmoji">☀️</span> 
        <span id="themeText">Modo Claro</span>
    </button>

    <div class="ambient-bg">
        <div class="blob" style="top: -10%; left: -10%;"></div>
        <div class="blob" style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, rgba(139, 92, 246, 0) 70%);"></div>
    </div>

    <div class="container">
        <nav class="nav-back">
            <a href="index.html" class="btn-back">
                &larr; Volver al Dashboard
            </a>
        </nav>

        <header>
            <h1>CSS Dictionary</h1>
            <p>Guía interactiva de propiedades CSS para un desarrollo web moderno y eficiente.</p>
        </header>

        <section class="controls">
            <div class="search-wrapper">
                <span class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </span>
                <input type="text" id="searchInput" placeholder="Buscar propiedad o descripción...">
            </div>

            <div class="filters" id="categoryFilters">
                <button class="filter-btn active" data-category="all" onclick="setCategory('all')">Todos</button>
            </div>
        </section>

        <main class="dictionary-grid" id="dictionaryGrid">
            <!-- Cards will be injected here -->
        </main>

        <div class="stats" id="statsInfo">
            Mostrando <span id="count">0</span> propiedades técnicas
        </div>

        <footer>
            <p>&copy; 2026 German Mardones. Recursos de Ingeniería Front-end.</p>
        </footer>
    </div>

    <script>

            { prop: "left", cat: "Posicionamiento", desc: "Posición desde la izquierda.", example: "left: -100px;" },
            { prop: "letter-spacing", cat: "Texto", desc: "Tracking (espacio entre letras).", example: "letter-spacing: normal;" },
            { prop: "line-height", cat: "Texto", desc: "Interlineado vertical.", example: "line-height: normal;" },
            { prop: "list-style", cat: "Listas", desc: "Visual de ítems de lista.", example: "list-style: none;" },
            { prop: "margin", cat: "Caja", desc: "Separación exterior de la caja.", example: "margin: 0;" },
            { prop: "max-width", cat: "Dimensiones", desc: "Tope de anchura permitido.", example: "max-width: 1200px;" },
            { prop: "min-height", cat: "Dimensiones", desc: "Altura mínima asegurada.", example: "min-height: 100vh;" },
            { prop: "mix-blend-mode", cat: "Efectos", desc: "Efecto de mezcla (Photoshop style).", example: "mix-blend-mode: overlay;" },
            { prop: "object-fit", cat: "Imágenes", desc: "Ajuste de archivo multimedia.", example: "object-fit: scale-down;" },
            { prop: "opacity", cat: "Efectos", desc: "Opacidad (transparencia total).", example: "opacity: 0;" },
            { prop: "order", cat: "Flexbox/Grid", desc: "Prioridad secuencial visual.", example: "order: 5;" },
            { prop: "overflow", cat: "Layout", desc: "Cortes de contenido saliente.", example: "overflow: scroll;", values: [{val:"hidden",desc:"Corta el exceso."},{val:"scroll",desc:"Barra siempre."},{val:"auto",desc:"Barra si es necesario."}] },
            { prop: "padding", cat: "Caja", desc: "Relleno interior de la caja.", example: "padding: 1.5rem;" },
            { 
                prop: "position", cat: "Posicionamiento", desc: "Tipo de posición.", example: "position: sticky;",
                values: [ { val: "fixed", desc: "Inmóvil en pantalla." }, { val: "sticky", desc: "Deslizante." } ]
            },
            { prop: "resize", cat: "Interfaz", desc: "Control de tirador de tamaño.", example: "resize: vertical;" },
            { prop: "right", cat: "Posicionamiento", desc: "Posición desde el borde derecho.", example: "right: 5%;" },
            { prop: "scroll-behavior", cat: "Interfaz", desc: "Transición de scroll nativo.", example: "scroll-behavior: smooth;" },
            { prop: "text-align", cat: "Texto", desc: "Alineación horizontal.", example: "text-align: right;", values: [{val:"left",desc:"A la izquierda."},{val:"center",desc:"Centrado."},{val:"right",desc:"A la derecha."},{val:"justify",desc:"Bloque completo."}] },
            { prop: "text-decoration", cat: "Texto", desc: "Barras, tachados y subrayados.", example: "text-decoration: line-through;" },
            { prop: "text-shadow", cat: "Texto", desc: "Sombras en el texto.", example: "text-shadow: 1px 1px black;" },
            { prop: "text-transform", cat: "Texto", desc: "Tipografía de caja.", example: "text-transform: lowercase;", values: [{val:"uppercase",desc:"MAYÚSCULAS."},{val:"lowercase",desc:"minúsculas."},{val:"capitalize",desc:"Primera Mayúscula."}] },
            { prop: "top", cat: "Posicionamiento", desc: "Distancia desde el techo.", example: "top: 0;" },
            { prop: "transform", cat: "Transformación", desc: "Distorsión y movimiento.", example: "transform: perspective(500px) rotateY(30deg);" },
            { prop: "transition", cat: "Animación", desc: "Curva de cambio suave.", example: "transition: transform 0.5s;" },
            { prop: "user-select", cat: "Interfaz", desc: "Permisos de selección manual.", example: "user-select: text;" },
            { prop: "vertical-align", cat: "Layout", desc: "Alineación vertical interna.", example: "vertical-align: baseline;" },
            { prop: "visibility", cat: "Layout", desc: "Estado visual binario.", example: "visibility: collapse;" },
            { prop: "white-space", cat: "Texto", desc: "Gestión de espacios en blanco.", example: "white-space: pre-wrap;" },
            { prop: "width", cat: "Dimensiones", desc: "Anchura del elemento.", example: "width: 50%;" },
            { prop: "word-break", cat: "Texto", desc: "Partición de palabras.", example: "word-break: keep-all;" },
            { prop: "word-spacing", cat: "Texto", desc: "Gap entre palabras.", example: "word-spacing: normal;" },
            { prop: "writing-mode", cat: "Texto", desc: "Dirección de escritura.", example: "writing-mode: vertical-rl;" },
            { prop: "z-index", cat: "Posicionamiento", desc: "Prioridad de profundidad.", example: "z-index: 10;" }
        ];

        const grid = document.getElementById('dictionaryGrid');
        const searchInput = document.getElementById('searchInput');
        const categoryFilters = document.getElementById('categoryFilters');
        const countSpan = document.getElementById('count');

        let currentCategory = 'all';
        let searchTerm = '';

        const categories = [...new Set(cssData.map(item => item.cat))].sort();
        
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.textContent = cat;
            btn.dataset.category = cat;
            btn.onclick = () => setCategory(cat);
            categoryFilters.appendChild(btn);
        });

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === cat);
            });
            render();
        }

        function render() {
            const filtered = cssData.filter(item => {
                const matchesCat = currentCategory === 'all' || item.cat === currentCategory;
                const matchesSearch = item.prop.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                     item.desc.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesCat && matchesSearch;
            });

            grid.innerHTML = filtered.length ? '' : '<div class="empty-state">No se encontraron propiedades que coincidan con tu búsqueda.</div>';
            
            filtered.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'prop-card';
                card.style.animationDelay = `${index * 0.05}s`;
                
                let valuesHtml = '';
                if (item.values && item.values.length > 0) {
                    valuesHtml = `
                        <div class="prop-values">
                            <div class="values-header">Valores Comunes</div>
                            ${item.values.map(v => `
                                <div class="value-row">
                                    <div class="value-name">${v.val}</div>
                                    <div class="value-desc">${v.desc}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="prop-category">${item.cat}</div>
                    <div class="prop-name">${item.prop}</div>
                    <div class="prop-desc">${item.desc}</div>
                    ${valuesHtml}
                    <div class="prop-example">Ejemplo: ${item.example}</div>
                `;
                grid.appendChild(card);
            });

            countSpan.textContent = filtered.length;
        }

        searchInput.oninput = (e) => {
            searchTerm = e.target.value;
            render();
        };

        render();

        const toggleBtn = document.getElementById('themeToggle');
        const themeEmoji = document.getElementById('themeEmoji');
        const themeText = document.getElementById('themeText');
        const root = document.documentElement;

        function updateThemeUI(isLight) {
            themeEmoji.textContent = isLight ? '🌙' : '☀️';
            themeText.textContent = isLight ? 'Modo Oscuro' : 'Modo Claro';
        }

        if (localStorage.getItem('theme') === 'light') {
            root.setAttribute('data-theme', 'light');
            updateThemeUI(true);
        }

        toggleBtn.addEventListener('click', () => {
            const isCurrentlyLight = root.hasAttribute('data-theme');
            if (isCurrentlyLight) {
                root.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
                updateThemeUI(false);
            } else {
                root.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                updateThemeUI(true);
            }
        });
    </script>
</body>
</html>
