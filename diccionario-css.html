<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diccionario CSS Premium</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-color: #0284c7;
            --accent-hover: #0369a1;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
        }

        /* Ambient Background Elements */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(56, 189, 248, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Nav */
        .nav-back {
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 8px;
            transition: var(--transition);
        }

        .btn-back:hover {
            background: rgba(56, 189, 248, 0.2);
            transform: translateX(-5px);
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Controls: Search & Filter */
        .controls {
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-wrapper input {
            width: 100%;
            padding: 1rem 1.5rem;
            padding-left: 3rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 99px;
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: var(--transition);
            outline: none;
        }

        .search-wrapper input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
        }

        .filter-btn {
            padding: 0.5rem 1.25rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            border-radius: 99px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .filter-btn:hover {
            border-color: var(--accent-color);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
            font-weight: 600;
        }

        /* Grid */
        .dictionary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        /* Card */
        .prop-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            overflow: hidden;
            height: 100%;
        }

        .prop-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: var(--card-shadow);
        }

        .prop-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 0;
            background: var(--accent-color);
            transition: var(--transition);
        }

        .prop-card:hover::before {
            height: 100%;
        }

        .prop-category {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-color);
            margin-bottom: 0.25rem;
        }

        .prop-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
        }

        .prop-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Stats */
        .stats {
            text-align: center;
            margin-top: 3rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 4rem;
            color: var(--text-secondary);
        }

        footer {
            margin-top: 5rem;
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid var(--glass-border);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            .dictionary-grid { grid-template-columns: 1fr; }
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 0.75rem 1.25rem;
            border-radius: 99px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: var(--transition);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--card-shadow);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            background: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">
        <span id="themeEmoji">☀️</span> 
        <span id="themeText">Modo Claro</span>
    </button>

    <div class="ambient-bg">
        <div class="blob" style="top: -10%; left: -10%;"></div>
        <div class="blob" style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, rgba(139, 92, 246, 0) 70%);"></div>
    </div>

    <div class="container">
        <nav class="nav-back">
            <a href="index.html" class="btn-back">
                &larr; Volver al Dashboard
            </a>
        </nav>

        <header>
            <h1>CSS Dictionary</h1>
            <p>Guía interactiva de propiedades CSS para un desarrollo web moderno y eficiente.</p>
        </header>

        <section class="controls">
            <div class="search-wrapper">
                <span class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </span>
                <input type="text" id="searchInput" placeholder="Buscar propiedad o descripción...">
            </div>

            <div class="filters" id="categoryFilters">
                <button class="filter-btn active" data-category="all" onclick="setCategory('all')">Todos</button>
            </div>
        </section>

        <main class="dictionary-grid" id="dictionaryGrid">
            <!-- Cards will be injected here -->
        </main>

        <div class="stats" id="statsInfo">
            Mostrando <span id="count">0</span> propiedades
        </div>

        <footer>
            <p>&copy; 2026 German Mardones. Diccionario de Referencia CSS.</p>
        </footer>
    </div>

        const grid = document.getElementById('dictionaryGrid');
        const searchInput = document.getElementById('searchInput');
        const categoryFilters = document.getElementById('categoryFilters');
        const countSpan = document.getElementById('count');

        let currentCategory = 'all';
        let searchTerm = '';

        // Extract unique categories
        const categories = [...new Set(cssData.map(item => item.cat))].sort();
        
        // Render Category Buttons
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.textContent = cat;
            btn.dataset.category = cat;
            btn.onclick = () => setCategory(cat);
            categoryFilters.appendChild(btn);
        });

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === cat);
            });
            render();
        }

        function render() {
            const filtered = cssData.filter(item => {
                const matchesCat = currentCategory === 'all' || item.cat === currentCategory;
                const matchesSearch = item.prop.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                     item.desc.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesCat && matchesSearch;
            });

            grid.innerHTML = filtered.length ? '' : '<div class="empty-state">No se encontraron propiedades que coincidan con tu búsqueda.</div>';
            
            filtered.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'prop-card';
                card.style.animationDelay = `${index * 0.05}s`;
                card.innerHTML = `
                    <div class="prop-category">${item.cat}</div>
                    <div class="prop-name">${item.prop}</div>
                    <div class="prop-desc">${item.desc}</div>
                `;
                grid.appendChild(card);
            });

            countSpan.textContent = filtered.length;
        }

        searchInput.oninput = (e) => {
            searchTerm = e.target.value;
            render();
        };

        // Initial Render
        render();

        // Theme Toggle Logic
        const toggleBtn = document.getElementById('themeToggle');
        const themeEmoji = document.getElementById('themeEmoji');
        const themeText = document.getElementById('themeText');
        const root = document.documentElement;

        function updateThemeUI(isLight) {
            themeEmoji.textContent = isLight ? '🌙' : '☀️';
            themeText.textContent = isLight ? 'Modo Oscuro' : 'Modo Claro';
        }

        // Check stored preference
        if (localStorage.getItem('theme') === 'light') {
            root.setAttribute('data-theme', 'light');
            updateThemeUI(true);
        }

        toggleBtn.addEventListener('click', () => {
            const isCurrentlyLight = root.hasAttribute('data-theme');
            if (isCurrentlyLight) {
                root.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
                updateThemeUI(false);
            } else {
                root.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                updateThemeUI(true);
            }
        });
    </script>
